name: Check Mode Estic Sol

on:
  schedule:
    # Comprova cada 15 minuts si el timer ha expirat
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      CUIDA_URL: ${{ secrets.CUIDA_URL }}
    steps:
      - name: Comprovar mode estic sol
        run: |
          TOKEN=$(curl -sf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=cuida-cron" | jq -r '.value')
          curl -s -X POST "${CUIDA_URL}/api/estic-sol-check" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            --fail-with-body
