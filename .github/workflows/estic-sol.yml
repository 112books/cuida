name: Check Mode Estic Sol

on:
  schedule:
    # Comprova cada 15 minuts si el timer ha expirat
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      CUIDA_URL: ${{ secrets.CUIDA_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Comprovar mode estic sol
        run: |
          curl -s -X POST "${CUIDA_URL}/api/estic-sol-check" \
            -H "X-Cron-Secret: ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            --fail-with-body
