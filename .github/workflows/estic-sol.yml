name: Check Mode Estic Sol

on:
  schedule:
    # Comprova cada 15 minuts si el timer ha expirat
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      CUIDA_URL: ${{ secrets.CUIDA_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Comprovar mode estic sol
        run: |
          TOKEN=$(cat .github/workflows/_cron-token.txt)
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${CUIDA_URL}/api/estic-sol-check" \
            -H "X-Cron-Token: ${TOKEN}" \
            -H "Content-Type: application/json")
          echo "HTTP status: $HTTP"
          [ "$HTTP" = "200" ] || exit 1
