name: Recordatoris de medicació

on:
  workflow_dispatch: {}

jobs:
  enviar-push:
    runs-on: ubuntu-latest
    env:
      CUIDA_URL: ${{ secrets.CUIDA_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Enviar recordatori push
        run: |
          TOKEN=$(cat .github/workflows/_cron-token.txt)
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${CUIDA_URL}/api/notificacions" \
            -H "X-Cron-Token: ${TOKEN}" \
            -H "Content-Type: application/json")
          echo "HTTP status: $HTTP"
          [ "$HTTP" = "200" ] || exit 1
