name: Recordatoris de medicació

on:
  schedule:
    # UTC: 6:00 = 8:00 CEST (matí)
    - cron: '0 6 * * *'
    # UTC: 11:30 = 13:30 CEST (migdia)
    - cron: '30 11 * * *'
    # UTC: 19:00 = 21:00 CEST (vespre)
    - cron: '0 19 * * *'
  workflow_dispatch: {}

jobs:
  enviar-push:
    runs-on: ubuntu-latest
    env:
      CUIDA_URL: ${{ secrets.CUIDA_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Enviar recordatori push
        run: |
          curl -s -X POST "${CUIDA_URL}/api/notificacions" \
            -H "X-Cron-Secret: ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            --fail-with-body
