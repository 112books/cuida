name: Recordatoris de medicació

on:
  schedule:
    # UTC: 6:00 = 8:00 CEST (matí)
    - cron: '0 6 * * *'
    # UTC: 11:30 = 13:30 CEST (migdia)
    - cron: '30 11 * * *'
    # UTC: 19:00 = 21:00 CEST (vespre)
    - cron: '0 19 * * *'
  workflow_dispatch: {}

jobs:
  enviar-push:
    runs-on: ubuntu-latest
    env:
      CUIDA_URL: ${{ secrets.CUIDA_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Enviar recordatori push
        run: |
          TOKEN=$(cat .github/workflows/_cron-token.txt)
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${CUIDA_URL}/api/notificacions" \
            -H "X-Cron-Token: ${TOKEN}" \
            -H "Content-Type: application/json")
          echo "HTTP status: $HTTP"
          [ "$HTTP" = "200" ] || exit 1
